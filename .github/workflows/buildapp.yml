name: ZIXINE FRESH BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release.jks

      - name: Setup Gradle and Build
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Install Gradle jika tidak ada gradlew
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK and Passkey
        uses: actions/upload-artifact@v4
        with:
          name: Zixine-Final-Package
          path: |
            app/build/outputs/apk/release/*.apk
            app/ZIXINE_PASSKEY.txt
